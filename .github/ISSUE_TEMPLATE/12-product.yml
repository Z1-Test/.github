name: Product 📦
description: Product lifecycle management
type: "Product 📦"
projects: ["StaytunedLLP/81"]

body:
  - type: markdown
    attributes:
      value: Let AI build, be orchestrator, ship instantly. 🤖🪄🚀

  - type: textarea
    attributes:
      label: Description
      value: |
        ### Purpose
        Capture stage, owner, and expected outcome for product lifecycle:
        - digital product (app, web, API)
        - physical product (hardware, kit, consumable)

        ### Outcome / Target
        1. Customer/job to be solved
        2. Success metric (KR, NPS, adoption, revenue, cycle time)

        ### Stage & Timeline
        1. Stage: Discovery / Design / Build / Validate / Launch / Operate
        2. Key milestone(s):
           - concept validation
           - prototype done
           - MVP release
           - production launch
        3. Go-live / ship date:

        ### Deliverables
        1. Requirements / user story
        2. Prototype / CAD / mockups
        3. Test plan (digital QA / physical manufacturing checks)
        4. Launch checklist

        ### Acceptance Criteria
        - [ ] Problem hypothesis validated (user research)
        - [ ] Requirements signed off
        - [ ] Build/prototype completed
        - [ ] QA/test pass
        - [ ] Launch readiness approved
        - [ ] Post-launch support/ops plan in place

        ### Handoff & Operations
        1. Release notes
        2. Training / docs
        3. Support escalation
        4. Continuous improvement backlog
